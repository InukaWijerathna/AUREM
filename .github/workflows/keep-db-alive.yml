name: Keep Database Alive

on:
  schedule:
    # Runs every 6 days at 00:00 UTC
    - cron: '0 0 */6 * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health endpoint
        run: |
          curl -sf "${{ secrets.BACKEND_URL }}/api/health" || exit 1
