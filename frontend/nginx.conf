server {
    listen 80;
    server_name _;

    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/javascript application/xml text/xml;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API requests to the backend service
    location /api/ {
        proxy_pass         http://backend:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Proxy local uploads (used when Cloudinary is not configured)
    location /uploads/ {
        proxy_pass         http://backend:5000/uploads/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # Long-lived cache for hashed static assets
    location ~* \.(js|css|woff2?|ttf|eot|ico|svg|png|jpg|jpeg|gif|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # React SPA — send every unknown path to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
